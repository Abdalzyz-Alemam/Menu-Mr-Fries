<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MR. FRIES | Modern Menu</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/index.css">
  </head>
  <body class="bg-slate-50 text-slate-900 transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100">
    
    <!-- Header / Sticky Navbar -->
    <header class="sticky top-0 z-50 w-full border-b border-slate-200 bg-white/80 backdrop-blur-md dark:border-slate-800 dark:bg-slate-900/80">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 md:px-8">
        <div class="flex items-center gap-2">
          <div class="h-8 w-8 rounded-full bg-orange-500"></div>
          <h1 id="brand-name" class="text-xl font-bold tracking-tight">LUMINA DINE</h1>
        </div>
        
        <div class="flex items-center gap-3">
          <!-- Dark Mode Toggle -->
          <button id="theme-toggle" class="rounded-full p-2 hover:bg-slate-100 dark:hover:bg-slate-800" aria-label="Toggle dark mode">
            <svg id="sun-icon" class="hidden h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m12.728 0A9 9 0 1111.25 12a9 9 0 0110.114-11.25z" />
            </svg>
            <svg id="moon-icon" class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          </button>
          
          <!-- Language Switcher -->
          <button id="lang-switch" class="rounded-lg border border-slate-200 px-3 py-1.5 text-sm font-medium hover:bg-slate-100 dark:border-slate-700 dark:hover:bg-slate-800">
            EN / AR
          </button>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-8 md:px-8">
      
      <!-- Hero Section -->
      <section class="mb-12 text-center">
        <h2 id="hero-title" class="mb-4 text-4xl font-extrabold md:text-5xl lg:text-6xl">
          Crafted Flavors, <span class="text-orange-500">Timeless</span> Moments.
        </h2>
        <p id="hero-subtitle" class="mx-auto max-w-2xl text-slate-500 dark:text-slate-400">
          Discover our curated selection of gourmet meals, refreshing drinks, and decadent desserts.
        </p>
      </section>

      <!-- Search and Filter Bar -->
      <div class="mb-8 flex flex-col gap-6 md:flex-row md:items-end md:justify-between">
        <!-- Search -->
        <div class="relative w-full max-w-md">
          <label for="search-input" id="search-label" class="mb-2 block text-sm font-medium text-slate-700 dark:text-slate-300">Search Menu</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
              <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </span>
            <input type="text" id="search-input" placeholder="What are you craving?" class="w-full rounded-2xl border border-slate-200 bg-white py-3 pl-10 pr-4 focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/20 dark:border-slate-800 dark:bg-slate-900 dark:text-white" />
          </div>
        </div>

        <!-- Category Filters -->
        <nav id="category-filters" class="flex flex-wrap gap-2" aria-label="Category filtering">
          <!-- Filter buttons will be injected here -->
        </nav>
      </div>

      <!-- Menu Grid -->
      <section id="menu-grid" class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
        <!-- Menu items will be injected here -->
      </section>

      <!-- Empty State -->
      <div id="empty-state" class="hidden py-24 text-center">
        <svg class="mx-auto mb-4 h-16 w-16 text-slate-300 dark:text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <p id="no-results-msg" class="text-xl font-medium text-slate-400">No items found matching your search.</p>
      </div>

    </main>

    <!-- Footer / Contact -->
    <footer class="mt-24 border-t border-slate-200 bg-white py-12 dark:border-slate-800 dark:bg-slate-900">
      <div class="mx-auto max-w-7xl px-4 text-center md:px-8">
        <h3 id="footer-title" class="mb-4 text-2xl font-bold">Lumina Dine</h3>
        <p id="footer-desc" class="mb-8 text-slate-500 dark:text-slate-400">Open Daily: 11:00 AM - 11:00 PM</p>
        
        <div class="flex flex-col items-center justify-center gap-6 md:flex-row">
          <!-- WhatsApp Button -->
          <a href="https://wa.me/249903670585" target="_blank" rel="noopener noreferrer" class="group flex items-center gap-3 rounded-full bg-green-600 px-8 py-3 font-semibold text-white transition-all hover:bg-green-700 hover:shadow-lg hover:shadow-green-500/30">
            <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.411-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
            <span id="whatsapp-btn-text">Order via WhatsApp</span>
          </a>
        </div>

        <div class="mt-12 text-sm text-slate-400">
          <p>&copy; 2026 Lumina Dine. Developed for the Modern Era.</p>
        </div>
      </div>
    </footer>

    <script type="module" src="/src/script.js"></script>
  </body>
</html>
